<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO meta tags are injected per-page by PageSEO (react-helmet-async) -->
    <title>RhemaAI Solutions Ltd</title>

    <!-- Fonts self-hosted via @fontsource-variable — no external DNS or render-blocking -->

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RhemaAI Solutions Ltd",
      "url": "https://rhemaaisolutions.tech",
      "logo": "https://rhemaaisolutions.tech/logo.png",
      "description": "Enterprise AI transformation, agentic AI systems, cloud architecture, data engineering and advanced analytics consulting.",
      "foundingDate": "2024",
      "sameAs": [
        "https://linkedin.com/company/rhemaai-tech",
        "https://github.com/phunkie24",
        "https://www.youtube.com/@Funtech-ai-x4t"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "info@rhemaaisolutions.tech"
      },
      "areaServed": "Worldwide",
      "knowsAbout": [
        "Artificial Intelligence",
        "Machine Learning",
        "Cloud Computing",
        "Data Engineering",
        "Agentic AI",
        "Microsoft Azure",
        "Amazon Web Services",
        "Google Cloud Platform",
        "Data Science",
        "Advanced Analytics"
      ]
    }
    </script>

    <!-- Structured Data: Professional Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "RhemaAI Solutions Ltd",
      "image": "https://rhemaaisolutions.tech/og-image.png",
      "priceRange": "$$$$",
      "url": "https://rhemaaisolutions.tech",
      "description": "Enterprise AI consulting, cloud architecture, data engineering and advanced analytics services",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "AI & Cloud Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Agentic AI Engineering" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Data Engineering & Platforms" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud Architecture" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Data Science & Advanced Analytics" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "MLOps & DataOps" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Enterprise Software Engineering" } }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
