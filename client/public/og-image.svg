<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B38"/>
      <stop offset="50%" stop-color="#12082A"/>
      <stop offset="100%" stop-color="#0A0414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B46FF"/>
      <stop offset="100%" stop-color="#9B6DFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#6B46FF" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="52" x2="1200" y2="52"/><line x1="0" y1="104" x2="1200" y2="104"/>
    <line x1="0" y1="156" x2="1200" y2="156"/><line x1="0" y1="208" x2="1200" y2="208"/>
    <line x1="0" y1="260" x2="1200" y2="260"/><line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="364" x2="1200" y2="364"/><line x1="0" y1="416" x2="1200" y2="416"/>
    <line x1="0" y1="468" x2="1200" y2="468"/><line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="572" x2="1200" y2="572"/>
    <line x1="52" y1="0" x2="52" y2="630"/><line x1="104" y1="0" x2="104" y2="630"/>
    <line x1="156" y1="0" x2="156" y2="630"/><line x1="208" y1="0" x2="208" y2="630"/>
    <line x1="260" y1="0" x2="260" y2="630"/><line x1="312" y1="0" x2="312" y2="630"/>
    <line x1="364" y1="0" x2="364" y2="630"/><line x1="416" y1="0" x2="416" y2="630"/>
    <line x1="468" y1="0" x2="468" y2="630"/><line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="572" y1="0" x2="572" y2="630"/><line x1="624" y1="0" x2="624" y2="630"/>
    <line x1="676" y1="0" x2="676" y2="630"/><line x1="728" y1="0" x2="728" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/><line x1="832" y1="0" x2="832" y2="630"/>
    <line x1="884" y1="0" x2="884" y2="630"/><line x1="936" y1="0" x2="936" y2="630"/>
    <line x1="988" y1="0" x2="988" y2="630"/><line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1092" y1="0" x2="1092" y2="630"/><line x1="1144" y1="0" x2="1144" y2="630"/>
    <line x1="1196" y1="0" x2="1196" y2="630"/>
  </g>

  <!-- Purple glow orb -->
  <circle cx="900" cy="200" r="280" fill="#6B46FF" fill-opacity="0.12"/>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="80" rx="3" fill="url(#accent)"/>

  <!-- Brand name -->
  <text x="104" y="252" font-family="'Segoe UI',system-ui,sans-serif" font-size="52" font-weight="800" fill="white">
    Rhema<tspan fill="#9B6DFF">AI</tspan> Technologies
  </text>

  <!-- Tagline -->
  <text x="104" y="310" font-family="'Segoe UI',system-ui,sans-serif" font-size="26" fill="rgba(255,255,255,0.6)" font-weight="400">
    Enterprise AI Systems for Production
  </text>

  <!-- Stat pills -->
  <rect x="104" y="360" width="200" height="44" rx="22" fill="rgba(107,70,255,0.2)" stroke="rgba(107,70,255,0.4)" stroke-width="1"/>
  <text x="204" y="388" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Azure · AWS · GCP</text>

  <rect x="320" y="360" width="180" height="44" rx="22" fill="rgba(107,70,255,0.2)" stroke="rgba(107,70,255,0.4)" stroke-width="1"/>
  <text x="410" y="388" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">10,000+ AI Patterns</text>

  <rect x="516" y="360" width="160" height="44" rx="22" fill="rgba(107,70,255,0.2)" stroke="rgba(107,70,255,0.4)" stroke-width="1"/>
  <text x="596" y="388" font-family="'Segoe UI',system-ui,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">50+ Projects</text>

  <!-- Domain -->
  <text x="104" y="560" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" fill="rgba(255,255,255,0.35)" font-weight="600">rhemaai.tech</text>
</svg>
