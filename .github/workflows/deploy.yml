name: CI / CD — RhemaAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test client (Vitest)
  # ─────────────────────────────────────────────
  test-client:
    name: Client tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: Test server (Jest)
  # ─────────────────────────────────────────────
  test-server:
    name: Server tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongoms-${{ runner.os }}-7.0

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test
        env:
          NODE_ENV: test
          MONGOMS_VERSION: 7.0.14
          MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

