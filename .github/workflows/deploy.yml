name: CI / CD — RhemaAI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test client (Vitest)
  # ─────────────────────────────────────────────
  test-client:
    name: Client tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: Test server (Jest)
  # ─────────────────────────────────────────────
  test-server:
    name: Server tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongoms-${{ runner.os }}-7.0

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test
        env:
          NODE_ENV: test
          MONGOMS_VERSION: 7.0.14
          MONGOMS_DOWNLOAD_DIR: ~/.cache/mongodb-binaries

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to VPS (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test-client, test-server]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== RhemaAI Deploy — $(date) ==="
            bash /var/www/rhemaai/deploy/deploy.sh

      - name: Health check
        run: |
          echo "Waiting 15s for server to stabilise..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://rhemaaisolutions.tech/api/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check FAILED (HTTP $STATUS) — triggering rollback"
            exit 1
          fi
          echo "Health check PASSED"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "=== ROLLBACK — $(date) ==="
            cd /var/www/rhemaai
            git revert HEAD --no-edit
            npm --prefix server ci --omit=dev
            VITE_API_URL=/api npm --prefix client run build
            pm2 restart rhemaai-server
            echo "Rollback complete"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }} by ${{ github.actor }}"
