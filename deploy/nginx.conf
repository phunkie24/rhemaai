# /etc/nginx/sites-available/rhemaai
# Deployed by deploy/setup.sh — DOMAIN is replaced with rhemaaisolutions.tech at install time.

# Non-JS crawlers (social link previews, some search bots) get server-
# rendered per-page meta tags from the backend instead of the empty SPA
# shell — see location / below. Real users and JS-executing bots (Google
# already renders JS) are unaffected either way.
map $http_user_agent $is_crawler {
    default 0;
    "~*facebookexternalhit|Facebot|Twitterbot|LinkedInBot|Slackbot|WhatsApp|TelegramBot|Discordbot|redditbot|Pinterest|Embedly|SkypeUriPreview|vkShare|W3C_Validator|Googlebot|bingbot|DuckDuckBot|Applebot|YandexBot" 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN www.DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://DOMAIN$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://DOMAIN$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN;

    # SSL — Certbot will populate these automatically
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers — defined at server level AND repeated in every location
    # block that has its own add_header (nginx drops inherited headers otherwise).
    include /etc/nginx/snippets/rhemaai-security.conf;

    server_tokens        off;
    client_max_body_size 25m;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json application/xml image/svg+xml;

    # React SPA — serve from built dist folder
    root  /var/www/rhemaai/client/dist;
    index index.html;

    # Uploaded assets — serve directly from disk (^~ beats regex locations)
    location ^~ /api/uploads/ {
        include /etc/nginx/snippets/rhemaai-security.conf;
        alias /var/www/rhemaai/server/uploads/;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Static assets — long-lived cache
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        include /etc/nginx/snippets/rhemaai-security.conf;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # API — proxy to Node.js backend (PM2, port 5000)
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Dynamic sitemap — generated from the database on the backend, so it
    # always reflects currently published products, insights, publications
    # and courses instead of a hand-maintained static file.
    location = /sitemap.xml {
        proxy_pass         http://127.0.0.1:5000/api/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Old admin path — hard 404, no hint this route exists
    location /admin {
        return 404;
    }

    # Operations portal — secret URL, password-protected at nginx level
    location /rh-ops-9m2k {
        include /etc/nginx/snippets/rhemaai-security.conf;
        auth_basic "RhemaAI";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # index.html must never be cached (React router needs fresh copy)
    location = /index.html {
        include /etc/nginx/snippets/rhemaai-security.conf;
        add_header Cache-Control "no-store" always;
    }

    # Netdata — server observability, admin-only
    location /netdata/ {
        include /etc/nginx/snippets/rhemaai-security.conf;
        proxy_pass http://127.0.0.1:19999/;
        proxy_set_header Host $host;
        auth_basic "RhemaAI";
        auth_basic_user_file /etc/nginx/.htpasswd_netdata;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # All other routes — React Router (SPA fallback), except crawlers (see
    # map above), which get prerendered per-page meta tags from the backend.
    # proxy_set_header must sit at this location level, not inside the `if`
    # below — nginx forbids proxy_set_header inside `if` blocks — but it
    # still applies to the proxy_pass triggered inside it.
    location / {
        include /etc/nginx/snippets/rhemaai-security.conf;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        if ($is_crawler) {
            proxy_pass http://127.0.0.1:5000;
        }

        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
