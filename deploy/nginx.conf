# /etc/nginx/sites-available/rhemaai
# Deployed by deploy/setup.sh — DOMAIN is replaced with rhemaaisolutions.tech at install time.

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN www.DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://DOMAIN$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://DOMAIN$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN;

    # SSL — Certbot will populate these automatically
    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers — defined at server level AND repeated in every location
    # block that has its own add_header (nginx drops inherited headers otherwise).
    include /etc/nginx/snippets/rhemaai-security.conf;

    server_tokens        off;
    client_max_body_size 25m;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json application/xml image/svg+xml;

    # React SPA — serve from built dist folder
    root  /var/www/rhemaai/client/dist;
    index index.html;

    # Uploaded assets — serve directly from disk (^~ beats regex locations)
    location ^~ /api/uploads/ {
        include /etc/nginx/snippets/rhemaai-security.conf;
        alias /var/www/rhemaai/server/uploads/;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Static assets — long-lived cache
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        include /etc/nginx/snippets/rhemaai-security.conf;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # API — proxy to Node.js backend (PM2, port 5000)
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Old admin path — hard 404, no hint this route exists
    location /admin {
        return 404;
    }

    # Operations portal — secret URL, password-protected at nginx level
    location /rh-ops-9m2k {
        include /etc/nginx/snippets/rhemaai-security.conf;
        auth_basic "RhemaAI";
        auth_basic_user_file /etc/nginx/.htpasswd_admin;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # index.html must never be cached (React router needs fresh copy)
    location = /index.html {
        include /etc/nginx/snippets/rhemaai-security.conf;
        add_header Cache-Control "no-store" always;
    }

    # Netdata — server observability, admin-only
    location /netdata/ {
        include /etc/nginx/snippets/rhemaai-security.conf;
        proxy_pass http://127.0.0.1:19999/;
        proxy_set_header Host $host;
        auth_basic "RhemaAI";
        auth_basic_user_file /etc/nginx/.htpasswd_netdata;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # All other routes — React Router (SPA fallback)
    location / {
        include /etc/nginx/snippets/rhemaai-security.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
