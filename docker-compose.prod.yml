services:
  mongo:
    image: mongo:7.0
    container_name: rhemaai-mongo-prod
    restart: unless-stopped
    volumes:
      - mongo_data_prod:/data/db
    environment:
      MONGO_INITDB_DATABASE: rhemaai
    healthcheck:
      test: ['CMD-SHELL', 'echo ''db.runCommand("ping").ok'' | mongosh localhost:27017/rhemaai --quiet']
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - '27017'

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rhemaai-server-prod
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/rhemaai
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env}
      CONTACT_ADMIN_KEY: ${CONTACT_ADMIN_KEY:?Set CONTACT_ADMIN_KEY in .env}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://127.0.0.1:5000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    expose:
      - '5000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: rhemaai-client-prod
    restart: unless-stopped
    # Bind to loopback only; host Nginx handles ports 80/443 and SSL.
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/health >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data_prod:
