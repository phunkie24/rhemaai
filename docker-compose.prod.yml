version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: rhemaai-mongo-prod
    restart: always
    volumes:
      - mongo_data_prod:/data/db
    environment:
      MONGO_INITDB_DATABASE: rhemaai
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/rhemaai --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally in production
    expose:
      - '27017'

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rhemaai-server-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/rhemaai
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - '5000'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: rhemaai-client-prod
    restart: always
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  mongo_data_prod:
